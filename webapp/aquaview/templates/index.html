<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:system-ui,sans-serif;
}

body {
  position:relative;
}

.clock {
  position:absolute;
  top:18px;
  right:24px;
  font-size:28px;
  font-variant-numeric:tabular-nums;
  letter-spacing:.04em;
  color:rgba(255,255,255,.9);
  z-index:10;
  display:flex;
  align-items:center;
  gap:10px;
}

.clock-icon {
  font-size:24px;
}

.viewport {
  width:100vw;
  height:100vh;
  touch-action:pan-y;
  user-select:none;
}

.track {
  display:flex;
  height:100%;
  transform:translate3d(0,0,0);
  transition:transform 260ms ease;
  will-change:transform;
}

.page {
  flex:0 0 100vw;
  width:100vw;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card {
  min-width:min(900px,92vw);
  padding:34px 38px;
  border-radius:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
  text-align:center;
}

.admin-card {
  background:#1a1a1a;
  min-width:min(980px,94vw);
  text-align:left;
}

.label { font-size:32px; opacity:.75; margin-bottom:12px; }
.value { font-size:140px; font-variant-numeric:tabular-nums; }
.sub   { margin-top:10px; font-size:18px; opacity:.55; }

.admin-title {
  font-size:34px;
  margin:0 0 12px;
}

.admin-text {
  font-size:20px;
  line-height:1.45;
  opacity:.86;
}

.admin-meta {
  margin-top:20px;
  padding:18px 20px;
  border-radius:16px;
  background:rgba(255,255,255,.06);
}

.admin-meta-row {
  font-size:18px;
  margin:8px 0;
}

.admin-actions {
  display:flex;
  gap:14px;
  flex-wrap:wrap;
  margin-top:22px;
}

.admin-button {
  border:0;
  border-radius:14px;
  padding:16px 22px;
  font-size:22px;
  color:#fff;
  cursor:pointer;
}

.admin-button:disabled {
  opacity:.5;
  cursor:default;
}

.admin-button.secondary { background:#4b5563; }
.admin-button.danger { background:#7f1d1d; }
.admin-button.primary { background:#0f766e; }
.admin-button.info { background:#1d4ed8; }

#adminFeedback {
  margin-top:18px;
  min-height:28px;
  font-size:18px;
  opacity:.82;
}

.dots {
  position:absolute;
  left:0; right:0; bottom:18px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.dot {
  width:10px; height:10px;
  border-radius:100px;
  background:rgba(255,255,255,.25);
}

.dot.active {
  background:rgba(255,255,255,.9);
}
</style>
</head>

<body>

<div class="clock">
  <span class="clock-icon">🕒</span>
  <span id="clockValue">--:--:--</span>
</div>

<div class="viewport" id="viewport">
  <div class="track" id="track">

    <div class="page">
      <div class="card" style="background:#003300;">
        <div class="label">Rum temp</div>
        <div class="value" id="value1">--</div>
        <div class="sub" id="roomStatus">No MQTT source</div>
      </div>
    </div>

    <div class="page">
      <div class="card" style="background:#001a33;">
        <div class="label">Akvarium</div>
        <div class="value" id="value2">--</div>
        <div class="sub" id="aquariumStatus">No MQTT source</div>
      </div>
    </div>

    <div class="page">
      <div class="card" style="background:#330000;">
        <div class="label">Raspberry Pi CPU</div>
        <div class="value" id="value3">--</div>
        <div class="sub" id="cpuStatus">No MQTT source</div>
      </div>
    </div>

    <div class="page">
      <div class="card admin-card">
        <h2 class="admin-title">System</h2>
        <div class="admin-text" id="adminSummary">Kontrollerar Git-status och kioskkontroller...</div>
        <div class="admin-meta">
          <div class="admin-meta-row" id="adminBranch">Branch: --</div>
          <div class="admin-meta-row" id="adminLocalCommit">Installerad version: --</div>
          <div class="admin-meta-row" id="adminRemoteCommit">Senaste origin-version: --</div>
          <div class="admin-meta-row" id="adminWorktree">Lokala ändringar: --</div>
        </div>
        <div class="admin-actions">
          <button class="admin-button info" id="refreshStatusButton">Kolla igen</button>
          <button class="admin-button secondary" id="minimizeButton">Minimera</button>
          <button class="admin-button danger" id="closeButton">Stäng kiosk</button>
          <button class="admin-button primary" id="updateButton">Uppdatera nu</button>
        </div>
        <div id="adminFeedback"></div>
      </div>
    </div>

  </div>

  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<script>
const viewport = document.getElementById("viewport");
const track = document.getElementById("track");
const dots = Array.from(document.querySelectorAll(".dot"));
const clockValue = document.getElementById("clockValue");

let index = 0;
let dragging = false;
let startX = 0;
let currentX = 0;
let baseTranslate = 0;
const pageCount = 4;

const adminSummary = document.getElementById("adminSummary");
const adminBranch = document.getElementById("adminBranch");
const adminLocalCommit = document.getElementById("adminLocalCommit");
const adminRemoteCommit = document.getElementById("adminRemoteCommit");
const adminWorktree = document.getElementById("adminWorktree");
const adminFeedback = document.getElementById("adminFeedback");
const refreshStatusButton = document.getElementById("refreshStatusButton");
const minimizeButton = document.getElementById("minimizeButton");
const closeButton = document.getElementById("closeButton");
const updateButton = document.getElementById("updateButton");
let adminStatusLoaded = false;

function formatValue(value){
  return value === null || value === undefined ? "--" : `${value.toFixed(1)}°C`;
}

function updateClock(){
  const now = new Date();
  clockValue.textContent = now.toLocaleTimeString("sv-SE", {
    hour: "2-digit",
    minute: "2-digit",
    second: "2-digit"
  });
}

function setDots(){
  dots.forEach((d,i)=>d.classList.toggle("active",i===index));
}

function setAdminBusy(isBusy){
  [refreshStatusButton, minimizeButton, closeButton, updateButton].forEach(button => {
    button.disabled = isBusy;
  });
}

function updateAdmin(system){
  if(!system){
    adminSummary.textContent = "Kunde inte läsa systemstatus.";
    adminBranch.textContent = "Branch: --";
    adminLocalCommit.textContent = "Installerad version: --";
    adminRemoteCommit.textContent = "Senaste origin-version: --";
    adminWorktree.textContent = "Lokala ändringar: --";
    updateButton.disabled = true;
    return;
  }

  adminSummary.textContent = system.summary || "Ingen systeminformation tillgänglig.";
  adminBranch.textContent = `Branch: ${system.branch || "--"}`;
  adminLocalCommit.textContent = `Installerad version: ${system.localCommitShort || "--"}`;
  adminRemoteCommit.textContent = `Senaste origin-version: ${system.remoteCommitShort || "--"}`;
  adminWorktree.textContent = `Lokala ändringar: ${system.worktreeClean ? "nej" : "ja"}`;
  updateButton.disabled = !system.updateAvailable || !system.worktreeClean;
}

async function loadAdminStatus(showProgress = false){
  if(showProgress){
    adminFeedback.textContent = "Kontrollerar Git-status...";
  }
  try{
    const response = await fetch("/api/admin/status", {cache:"no-store"});
    const data = await response.json();
    if(!response.ok || !data.ok){
      adminFeedback.textContent = data.error || "Kunde inte läsa systemstatus.";
      return;
    }
    updateAdmin(data.system);
    adminStatusLoaded = true;
    if(showProgress){
      adminFeedback.textContent = "Status uppdaterad.";
    }
  }catch{
    adminFeedback.textContent = "Kunde inte nå backend för Git-status.";
  }
}

async function runAdminAction(action){
  setAdminBusy(true);
  adminFeedback.textContent = "Kör kommando...";
  try{
    const response = await fetch("/api/admin/action",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({action})
    });
    const data = await response.json();
    if(!response.ok || !data.ok){
      adminFeedback.textContent = data.error || "Kommandot misslyckades.";
      return;
    }
    adminFeedback.textContent = data.message || "Klart.";
  }catch{
    adminFeedback.textContent = "Kunde inte nå backend.";
  }finally{
    setAdminBusy(false);
    loadAdminStatus(false);
  }
}

function snap(notify = false){
  const w = window.innerWidth;
  track.style.transition = "transform 260ms ease";
  track.style.transform = `translate3d(${-index*w}px,0,0)`;
  setDots();
  if(notify){
    publishCurrentView();
  }
}

async function publishCurrentView(){
  try{
    await fetch("/api/view",{
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body:JSON.stringify({index})
    });
  }catch{}
}

function down(x){
  dragging = true;
  startX = currentX = x;
  baseTranslate = -index * window.innerWidth;
  track.style.transition = "none";
}

function move(x){
  if(!dragging) return;
  currentX = x;
  track.style.transform = `translate3d(${baseTranslate + (x - startX)}px,0,0)`;
}

function up(){
  if(!dragging) return;
  dragging = false;

  const dx = currentX - startX;
  const w = window.innerWidth;
  const threshold = Math.max(80, w * 0.15);
  const previousIndex = index;

  if(dx < -threshold && index < pageCount - 1) index++;
  else if(dx > threshold && index > 0) index--;

  snap(index !== previousIndex);
}

async function updateState(){
  try{
    const response = await fetch("/api/state", {cache:"no-store"});
    const data = await response.json();

    document.getElementById("value1").textContent = formatValue(data.room.value);
    document.getElementById("roomStatus").textContent = data.room.status;

    document.getElementById("value2").textContent = formatValue(data.aquarium.value);
    document.getElementById("aquariumStatus").textContent = data.aquarium.status;

    document.getElementById("value3").textContent = formatValue(data.cpu.value);
    document.getElementById("cpuStatus").textContent = data.cpu.status;

    if(!dragging && data.currentView && data.currentView.index !== index){
      index = data.currentView.index;
      snap(false);
    }

    if(index === 3 && !adminStatusLoaded){
      loadAdminStatus(true);
    }
  }catch{
    document.getElementById("roomStatus").textContent = "Backend offline";
    document.getElementById("aquariumStatus").textContent = "Backend offline";
    document.getElementById("cpuStatus").textContent = "Backend offline";
  }
}

viewport.addEventListener("pointerdown", e => {
  viewport.setPointerCapture?.(e.pointerId);
  down(e.clientX);
});
viewport.addEventListener("pointermove", e => move(e.clientX));
viewport.addEventListener("pointerup", up);
viewport.addEventListener("pointercancel", up);

viewport.addEventListener("mousedown", e => down(e.clientX));
viewport.addEventListener("mousemove", e => move(e.clientX));
window.addEventListener("mouseup", up);

window.addEventListener("resize", () => snap(false));

refreshStatusButton.addEventListener("click", () => loadAdminStatus(true));
minimizeButton.addEventListener("click", () => runAdminAction("minimize"));
closeButton.addEventListener("click", () => runAdminAction("close"));
updateButton.addEventListener("click", () => runAdminAction("update"));

setInterval(updateState, 500);
setInterval(updateClock, 1000);
updateState();
updateClock();
snap(false);
</script>
</body>
</html>
