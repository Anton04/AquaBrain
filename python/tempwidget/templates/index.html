<!doctype html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
html, body {
  margin:0;
  padding:0;
  height:100%;
  overflow:hidden;
  background:#000;
  color:#fff;
  font-family:system-ui,sans-serif;
}

/* viewport */
.viewport {
  width:100vw;
  height:100vh;
  touch-action:pan-y;
  user-select:none;
}

/* track */
.track {
  display:flex;
  height:100%;
  transform:translate3d(0,0,0);
  transition:transform 260ms ease;
  will-change:transform;
}

/* pages */
.page {
  flex:0 0 100vw;
  width:100vw;
  height:100%;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* cards */
.card {
  min-width:min(900px,92vw);
  padding:34px 38px;
  border-radius:22px;
  box-shadow:0 10px 30px rgba(0,0,0,.35);
  text-align:center;
}

.label { font-size:32px; opacity:.75; margin-bottom:12px; }
.value { font-size:140px; font-variant-numeric:tabular-nums; }
.sub   { margin-top:10px; font-size:18px; opacity:.55; }

/* dots */
.dots {
  position:absolute;
  left:0; right:0; bottom:18px;
  display:flex;
  justify-content:center;
  gap:10px;
}

.dot {
  width:10px; height:10px;
  border-radius:100px;
  background:rgba(255,255,255,.25);
}

.dot.active {
  background:rgba(255,255,255,.9);
}
</style>
</head>

<body>

<div class="viewport" id="viewport">
  <div class="track" id="track">

    <div class="page">
      <div class="card" style="background:#003300;">
        <div class="label">Rum temp</div>
        <div class="value" id="value1">--</div>
        <div class="sub">Simulerad</div>
      </div>
    </div>

    <div class="page">
      <div class="card" style="background:#001a33;">
        <div class="label">Akvarium</div>
        <div class="value" id="value2">--</div>
        <div class="sub">Simulerad</div>
      </div>
    </div>

    <div class="page">
      <div class="card" style="background:#330000;">
        <div class="label">Raspberry Pi CPU</div>
        <div class="value" id="value3">--</div>
        <div class="sub" id="cpuStatus">Live sensor</div>
      </div>
    </div>

  </div>

  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>
</div>

<script>

// -------- Simulerade värden --------
function updateSim(){
  const t = Date.now()/1000;

  document.getElementById("value1").textContent =
    (22 + Math.sin(t/20)*1.5).toFixed(1)+"°C";

  document.getElementById("value2").textContent =
    (25 + Math.sin(t/15)*0.4).toFixed(1)+"°C";
}

setInterval(updateSim,500);
updateSim();


// -------- CPU-temp --------
async function updateCPU(){
  try{
    const r = await fetch("/api/temp",{cache:"no-store"});
    const j = await r.json();

    if(j.cpu !== undefined && j.cpu !== null){
      document.getElementById("value3").textContent =
        j.cpu.toFixed(1)+"°C";
      document.getElementById("cpuStatus").textContent="Live sensor";
    }
  }catch{
    document.getElementById("cpuStatus").textContent="Fallback";
  }
}

setInterval(updateCPU,2000);
updateCPU();


// -------- Swipe carousel --------
const viewport = document.getElementById("viewport");
const track = document.getElementById("track");
const dots = Array.from(document.querySelectorAll(".dot"));

let index=0;
let dragging=false;
let startX=0;
let currentX=0;
let baseTranslate=0;
const pageCount=3;

function setDots(){
  dots.forEach((d,i)=>d.classList.toggle("active",i===index));
}

function snap(){
  const w = window.innerWidth;
  track.style.transition="transform 260ms ease";
  track.style.transform=`translate3d(${-index*w}px,0,0)`;
  setDots();
}

function down(x){
  dragging=true;
  startX=currentX=x;
  baseTranslate=-index*window.innerWidth;
  track.style.transition="none";
}

function move(x){
  if(!dragging) return;
  currentX=x;
  track.style.transform=
    `translate3d(${baseTranslate+(x-startX)}px,0,0)`;
}

function up(){
  if(!dragging) return;
  dragging=false;

  const dx=currentX-startX;
  const w=window.innerWidth;
  const threshold=Math.max(80,w*0.15);

  if(dx<-threshold && index<pageCount-1) index++;
  else if(dx>threshold && index>0) index--;

  snap();
}

// pointer events
viewport.addEventListener("pointerdown",e=>{
  viewport.setPointerCapture?.(e.pointerId);
  down(e.clientX);
});
viewport.addEventListener("pointermove",e=>move(e.clientX));
viewport.addEventListener("pointerup",up);
viewport.addEventListener("pointercancel",up);

// mouse fallback
viewport.addEventListener("mousedown",e=>down(e.clientX));
viewport.addEventListener("mousemove",e=>move(e.clientX));
window.addEventListener("mouseup",up);

window.addEventListener("resize",snap);

snap();

</script>
</body>
</html>
